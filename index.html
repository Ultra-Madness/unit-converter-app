<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Unit Converter</title>
<meta name="description" content="Convert common measurements quickly — length, weight, temperature, volume, cooking, data, and more." />
<!-- iOS home-screen app -->
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Converter" />
<meta name="theme-color" content="#1e293b" />
<link rel="apple-touch-icon" href="icon.png" />
<link rel="icon" href="icon.png" />
<style>
:root{
  --card:#ffffff;--ink:#0f172a;--muted:#64748b;--line:#e2e8f0;
  --brand:#4f46e5;--brand-soft:#eef2ff;--result-bg:#f8fafc;
  --summary-bg:#ecfdf5;--summary-line:#a7f3d0;--summary-ink:#065f46;
  --radius:14px;--shadow:0 10px 30px rgba(2,6,23,.18);
}
/* Light theme overrides (toggled via body.light) */
body.light{
  --card:#ffffff;--ink:#0f172a;--muted:#64748b;--line:#e2e8f0;
  --brand:#4f46e5;--brand-soft:#eef2ff;--result-bg:#f1f5f9;
}
*{box-sizing:border-box}
body{
  margin:0;min-height:100vh;
  font-family:system-ui,-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  color:var(--ink);
  /* Dark (default) gradient. Full gradients per-theme so iOS repaints reliably. */
  background:linear-gradient(160deg,#1e293b 0%,#4f46e5 100%);
  display:flex;justify-content:center;padding:32px 16px;
  padding-top:max(32px,env(safe-area-inset-top));
}
body.light{background:linear-gradient(160deg,#e0e7ff 0%,#a5b4fc 100%)}
.app{width:100%;max-width:720px}
.topbar{display:flex;align-items:center;justify-content:center;position:relative;margin-bottom:6px}
.theme-toggle{
  position:absolute;right:0;top:0;border:1px solid rgba(255,255,255,.35);
  background:rgba(255,255,255,.12);color:#fff;border-radius:999px;
  padding:6px 12px;font-size:.85rem;cursor:pointer
}
body.light .theme-toggle{border-color:rgba(15,23,42,.2);background:rgba(255,255,255,.5);color:#1e293b}
.header{text-align:center;color:#fff;margin-bottom:20px}
body.light .header{color:#1e293b}
.header h1{margin:0;font-size:2rem;letter-spacing:-.02em}
.tagline{margin:6px 0 0;opacity:.85}
.tabs{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-bottom:18px}
.tab{display:inline-flex;align-items:center;gap:6px;border:1px solid rgba(255,255,255,.25);
  background:rgba(255,255,255,.08);color:#fff;padding:8px 12px;border-radius:999px;cursor:pointer;
  font-size:.85rem;transition:all .15s ease}
body.light .tab{border-color:rgba(15,23,42,.15);background:rgba(255,255,255,.45);color:#1e293b}
.tab:hover{background:rgba(255,255,255,.18)}
body.light .tab:hover{background:rgba(255,255,255,.7)}
.tab.active{background:#fff;color:var(--brand);border-color:#fff;font-weight:600}
.tab-icon{font-size:1rem}
.card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);padding:24px}
.row{display:grid;grid-template-columns:1fr 1.3fr;gap:16px}
.field{display:flex;flex-direction:column;gap:6px}
.field-label{font-size:.75rem;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);font-weight:600}
.input,.select{width:100%;padding:12px 14px;border:1px solid var(--line);border-radius:10px;
  font-size:1rem;background:#fff;color:var(--ink)}
.input:focus,.select:focus{outline:none;border-color:var(--brand);box-shadow:0 0 0 3px var(--brand-soft)}
.result{display:flex;align-items:center;padding:12px 14px;border:1px dashed var(--line);border-radius:10px;
  background:var(--result-bg);font-size:1.15rem;font-weight:700;color:var(--brand);min-height:48px;overflow-wrap:anywhere}
.swap-row{display:flex;justify-content:center;margin:14px 0}
.swap-btn{border:1px solid var(--line);background:var(--brand-soft);color:var(--brand);padding:8px 16px;
  border-radius:999px;cursor:pointer;font-weight:600;transition:all .15s ease}
.swap-btn:hover{background:var(--brand);color:#fff}
.summary{margin:18px 0 0;padding:14px;background:var(--summary-bg);border:1px solid var(--summary-line);border-radius:10px;
  text-align:center;color:var(--summary-ink);overflow-wrap:anywhere}
.note{margin:14px 0 0;font-size:.85rem;color:var(--muted);line-height:1.4}
.footer{margin-top:18px;text-align:center;color:rgba(255,255,255,.75);font-size:.8rem}
body.light .footer{color:rgba(30,41,59,.7)}
@media(max-width:520px){.row{grid-template-columns:1fr}.header h1{font-size:1.6rem}}
</style>
</head>
<body>
<div id="root"></div>

<script>
/* ---- Conversion engine ---- */
const CATEGORIES = [
  {id:'length',name:'Length',icon:'📏',type:'linear',units:[
    {id:'mm',name:'Millimeter (mm)',factor:0.001},{id:'cm',name:'Centimeter (cm)',factor:0.01},
    {id:'m',name:'Meter (m)',factor:1},{id:'km',name:'Kilometer (km)',factor:1000},
    {id:'in',name:'Inch (in)',factor:0.0254},{id:'ft',name:'Foot (ft)',factor:0.3048},
    {id:'yd',name:'Yard (yd)',factor:0.9144},{id:'mi',name:'Mile (mi)',factor:1609.344},
    {id:'nmi',name:'Nautical mile',factor:1852}]},
  {id:'weight',name:'Weight / Mass',icon:'⚖️',type:'linear',units:[
    {id:'mg',name:'Milligram (mg)',factor:0.001},{id:'g',name:'Gram (g)',factor:1},
    {id:'kg',name:'Kilogram (kg)',factor:1000},{id:'t',name:'Metric ton (t)',factor:1000000},
    {id:'oz',name:'Ounce (oz)',factor:28.349523125},{id:'lb',name:'Pound (lb)',factor:453.59237},
    {id:'st',name:'Stone (st)',factor:6350.29318}]},
  {id:'temperature',name:'Temperature',icon:'🌡️',type:'special',units:[
    {id:'c',name:'Celsius (°C)',toBase:v=>v,fromBase:v=>v},
    {id:'f',name:'Fahrenheit (°F)',toBase:v=>(v-32)*(5/9),fromBase:v=>v*(9/5)+32},
    {id:'k',name:'Kelvin (K)',toBase:v=>v-273.15,fromBase:v=>v+273.15}]},
  {id:'volume',name:'Volume',icon:'🧪',type:'linear',units:[
    {id:'ml',name:'Milliliter (mL)',factor:0.001},{id:'l',name:'Liter (L)',factor:1},
    {id:'m3',name:'Cubic meter (m³)',factor:1000},{id:'tsp_us',name:'Teaspoon (US)',factor:0.00492892159375},
    {id:'tbsp_us',name:'Tablespoon (US)',factor:0.01478676478125},{id:'floz_us',name:'Fluid ounce (US)',factor:0.0295735295625},
    {id:'cup_us',name:'Cup (US)',factor:0.2365882365},{id:'pt_us',name:'Pint (US)',factor:0.473176473},
    {id:'qt_us',name:'Quart (US)',factor:0.946352946},{id:'gal_us',name:'Gallon (US)',factor:3.785411784},
    {id:'gal_uk',name:'Gallon (UK)',factor:4.54609}]},
  {id:'area',name:'Area',icon:'⬛',type:'linear',units:[
    {id:'cm2',name:'Square cm (cm²)',factor:0.0001},{id:'m2',name:'Square meter (m²)',factor:1},
    {id:'ha',name:'Hectare (ha)',factor:10000},{id:'km2',name:'Square km (km²)',factor:1000000},
    {id:'in2',name:'Square inch (in²)',factor:0.00064516},{id:'ft2',name:'Square foot (ft²)',factor:0.09290304},
    {id:'yd2',name:'Square yard (yd²)',factor:0.83612736},{id:'ac',name:'Acre',factor:4046.8564224},
    {id:'mi2',name:'Square mile (mi²)',factor:2589988.110336}]},
  {id:'speed',name:'Speed',icon:'🚗',type:'linear',units:[
    {id:'mps',name:'Meters/second (m/s)',factor:1},{id:'kmh',name:'Kilometers/hour (km/h)',factor:0.277777778},
    {id:'mph',name:'Miles/hour (mph)',factor:0.44704},{id:'fts',name:'Feet/second (ft/s)',factor:0.3048},
    {id:'kn',name:'Knot (kn)',factor:0.514444444}]},
  {id:'cooking',name:'Cooking',icon:'🍳',type:'linear',
    note:'Cooking units here are by volume. To convert cups to grams you need the ingredient density — use the Weight tab for pure mass.',units:[
    {id:'tsp',name:'Teaspoon (tsp)',factor:4.92892159375},{id:'tbsp',name:'Tablespoon (tbsp)',factor:14.78676478125},
    {id:'floz',name:'Fluid ounce (fl oz)',factor:29.5735295625},{id:'cup',name:'Cup (US)',factor:236.5882365},
    {id:'pt',name:'Pint (US)',factor:473.176473},{id:'ml',name:'Milliliter (mL)',factor:1},
    {id:'l',name:'Liter (L)',factor:1000}]},
  {id:'data',name:'Digital / Data',icon:'💾',type:'linear',
    note:'Decimal units (KB, MB…) use 1000. Binary units (KiB, MiB…) use 1024.',units:[
    {id:'bit',name:'Bit',factor:0.125},{id:'byte',name:'Byte (B)',factor:1},
    {id:'kb',name:'Kilobyte (KB, 1000)',factor:1e3},{id:'mb',name:'Megabyte (MB, 1000)',factor:1e6},
    {id:'gb',name:'Gigabyte (GB, 1000)',factor:1e9},{id:'tb',name:'Terabyte (TB, 1000)',factor:1e12},
    {id:'kib',name:'Kibibyte (KiB, 1024)',factor:1024},{id:'mib',name:'Mebibyte (MiB, 1024)',factor:1024**2},
    {id:'gib',name:'Gibibyte (GiB, 1024)',factor:1024**3},{id:'tib',name:'Tebibyte (TiB, 1024)',factor:1024**4}]},
  {id:'time',name:'Time',icon:'⏱️',type:'linear',units:[
    {id:'ms',name:'Millisecond (ms)',factor:0.001},{id:'s',name:'Second (s)',factor:1},
    {id:'min',name:'Minute (min)',factor:60},{id:'h',name:'Hour (h)',factor:3600},
    {id:'day',name:'Day',factor:86400},{id:'week',name:'Week',factor:604800},
    {id:'month',name:'Month (30 d)',factor:2592000},{id:'year',name:'Year (365 d)',factor:31536000}]},
  {id:'energy',name:'Energy',icon:'⚡',type:'linear',units:[
    {id:'j',name:'Joule (J)',factor:1},{id:'kj',name:'Kilojoule (kJ)',factor:1000},
    {id:'cal',name:'Calorie (cal)',factor:4.184},{id:'kcal',name:'Kilocalorie (kcal / Cal)',factor:4184},
    {id:'wh',name:'Watt-hour (Wh)',factor:3600},{id:'kwh',name:'Kilowatt-hour (kWh)',factor:3600000},
    {id:'btu',name:'BTU',factor:1055.05585262},{id:'ftlb',name:'Foot-pound (ft·lb)',factor:1.3558179483314004}]},
];

function convert(cat,fromId,toId,value){
  const num=typeof value==='number'?value:parseFloat(value);
  if(!isFinite(num))return NaN;
  const from=cat.units.find(u=>u.id===fromId), to=cat.units.find(u=>u.id===toId);
  if(!from||!to)return NaN;
  if(cat.type==='special')return to.fromBase(from.toBase(num));
  return (num*from.factor)/to.factor;
}
function formatResult(n){
  if(!isFinite(n))return'';
  if(n===0)return'0';
  const abs=Math.abs(n);
  if(abs>=1e-4&&abs<1e15)return String(parseFloat(n.toPrecision(10)));
  return n.toExponential(6);
}
function stripParens(name){return name.replace(/\s*\(.*?\)\s*/g,' ').trim();}

/* ---- State ---- */
const state={
  categoryId:CATEGORIES[0].id,
  amount:'1',
  sel:Object.fromEntries(CATEGORIES.map(c=>[c.id,{from:c.units[0].id,to:c.units[1].id}])),
};
const root=document.getElementById('root');

/* Theme: class toggle + localStorage (iOS-safe; no variable-in-gradient) */
function loadTheme(){
  try{ if(localStorage.getItem('uc-theme')==='light') document.body.classList.add('light'); }catch(e){}
}
function toggleTheme(){
  document.body.classList.toggle('light');
  const light=document.body.classList.contains('light');
  try{ localStorage.setItem('uc-theme', light?'light':'dark'); }catch(e){}
  const meta=document.querySelector('meta[name="theme-color"]');
  if(meta) meta.setAttribute('content', light?'#e0e7ff':'#1e293b');
  const btn=document.getElementById('themeBtn'); if(btn) btn.textContent=light?'🌙 Dark':'☀️ Light';
}

function render(){
  const cat=CATEGORIES.find(c=>c.id===state.categoryId);
  const {from,to}=state.sel[state.categoryId];
  const result=convert(cat,from,to,state.amount);
  const hasResult=state.amount!==''&&isFinite(result);
  const fromName=cat.units.find(u=>u.id===from)?.name||'';
  const toName=cat.units.find(u=>u.id===to)?.name||'';
  const opts=sel=>cat.units.map(u=>`<option value="${u.id}" ${u.id===sel?'selected':''}>${u.name}</option>`).join('');
  const light=document.body.classList.contains('light');

  root.innerHTML=`
  <div class="app">
    <div class="topbar">
      <button class="theme-toggle" id="themeBtn">${light?'🌙 Dark':'☀️ Light'}</button>
    </div>
    <header class="header">
      <h1>Unit Converter</h1>
      <p class="tagline">Convert common measurements quickly.</p>
    </header>
    <nav class="tabs">
      ${CATEGORIES.map(c=>`<button class="tab ${c.id===state.categoryId?'active':''}" data-cat="${c.id}">
        <span class="tab-icon">${c.icon}</span><span>${c.name}</span></button>`).join('')}
    </nav>
    <main class="card">
      <div class="row">
        <label class="field"><span class="field-label">Amount</span>
          <input class="input" id="amount" type="number" inputmode="decimal" value="${state.amount}" placeholder="Enter a value"/></label>
        <label class="field"><span class="field-label">From</span>
          <select class="select" id="from">${opts(from)}</select></label>
      </div>
      <div class="swap-row"><button class="swap-btn" id="swap">⇅ Swap</button></div>
      <div class="row">
        <div class="field"><span class="field-label">Result</span>
          <output class="result">${hasResult?formatResult(result):'—'}</output></div>
        <label class="field"><span class="field-label">To</span>
          <select class="select" id="to">${opts(to)}</select></label>
      </div>
      ${hasResult?`<p class="summary">${formatResult(Number(state.amount))} ${stripParens(fromName)} =
        <strong>${formatResult(result)} ${stripParens(toName)}</strong></p>`:''}
      ${cat.note?`<p class="note">ℹ️ ${cat.note}</p>`:''}
    </main>
    <footer class="footer">Runs entirely on your device — no internet needed.</footer>
  </div>`;

  document.getElementById('themeBtn').onclick=toggleTheme;
  root.querySelectorAll('.tab').forEach(b=>b.onclick=()=>{state.categoryId=b.dataset.cat;render();});
  document.getElementById('amount').oninput=e=>{state.amount=e.target.value;update();};
  document.getElementById('from').onchange=e=>{state.sel[state.categoryId].from=e.target.value;update();};
  document.getElementById('to').onchange=e=>{state.sel[state.categoryId].to=e.target.value;update();};
  document.getElementById('swap').onclick=()=>{
    const s=state.sel[state.categoryId];[s.from,s.to]=[s.to,s.from];render();
  };
}
/* Light update that preserves focus/caret in the amount box while typing. */
function update(){
  const active=document.activeElement, isAmount=active&&active.id==='amount';
  const pos=isAmount?active.selectionStart:null;
  render();
  if(isAmount){const a=document.getElementById('amount');a.focus();try{a.setSelectionRange(pos,pos);}catch(e){}}
}
loadTheme();
render();
</script>
</body>
</html>
